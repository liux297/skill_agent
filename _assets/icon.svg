<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#0984E3"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="40" height="40" rx="8" fill="url(#bg)"/>
  <!-- SKILL 文字 -->
  <text x="20" y="25" font-size="11" font-weight="bold" fill="white" font-family="Arial,Helvetica,sans-serif" text-anchor="middle" letter-spacing="1.5">SKILL</text>
  <!-- 底部装饰线 -->
  <rect x="8" y="28" width="24" height="2" rx="1" fill="rgba(255,255,255,0.35)"/>
</svg>
