<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="glow" x1="50" y1="18" x2="50" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="100" height="100" rx="24" fill="url(#bg)"/>
  <!-- 高光层 -->
  <rect x="4" y="4" width="92" height="92" rx="20" fill="url(#shine)"/>

  <!-- 中心：闪电 = 智能执行 -->
  <path d="M55 18L34 50H47L42 82L66 46H53Z" fill="url(#glow)"/>
  <!-- 闪电发光效果 -->
  <path d="M55 18L34 50H47L42 82L66 46H53Z" fill="none" stroke="rgba(251,191,36,0.3)" stroke-width="3"/>

  <!-- 左侧技能卡片层叠 -->
  <rect x="10" y="34" width="22" height="16" rx="3" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
  <rect x="12" y="30" width="22" height="16" rx="3" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <!-- 卡片上的线条 -->
  <line x1="16" y1="36" x2="30" y2="36" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="40" x2="26" y2="40" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-linecap="round"/>

  <!-- 右侧技能卡片层叠 -->
  <rect x="68" y="50" width="22" height="16" rx="3" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
  <rect x="70" y="46" width="22" height="16" rx="3" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <!-- 卡片上的线条 -->
  <line x1="74" y1="52" x2="88" y2="52" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="74" y1="56" x2="84" y2="56" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-linecap="round"/>

  <!-- 底部连接节点 -->
  <circle cx="28" cy="76" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="50" cy="82" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="72" cy="76" r="3" fill="rgba(255,255,255,0.3)"/>
  <line x1="28" y1="76" x2="50" y2="82" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>
  <line x1="50" y1="82" x2="72" y2="76" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>
</svg>