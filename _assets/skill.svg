<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="50%" stop-color="#8E44AD"/>
      <stop offset="100%" stop-color="#0984E3"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角 -->
  <rect width="100" height="100" rx="24" fill="url(#bg)"/>

  <!-- 高光层 -->
  <rect x="4" y="4" width="92" height="92" rx="20" fill="url(#shine)" pointer-events="none"/>

  <!-- 中心主体 -->
  <g transform="translate(50, 48)">
    <!-- 连接轨道 -->
    <circle cx="0" cy="0" r="32" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-dasharray="5 3" fill="none"/>

    <!-- 技能节点1：左上 - 工具图标 -->
    <g transform="translate(-21, -16)">
      <circle r="7" fill="white" opacity="0.95"/>
      <path d="M-3 0 L3 0 M0 -3 L0 3 M-2 -2 L2 2 M-2 2 L2 -2" stroke="#6C5CE7" stroke-width="1.6" stroke-linecap="round"/>
    </g>

    <!-- 技能节点2：右上 - 齿轮图标 -->
    <g transform="translate(21, -16)">
      <circle r="7" fill="white" opacity="0.95"/>
      <circle r="3" stroke="#0984E3" stroke-width="1.6" fill="none"/>
      <path d="M0 -4.5 L0 -3.5 M0 3.5 L0 4.5 M-4.5 0 L-3.5 0 M3.5 0 L4.5 0" stroke="#0984E3" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- 技能节点3：右下 - 闪电/执行图标 -->
    <g transform="translate(17, 15)">
      <circle r="6" fill="white" opacity="0.9"/>
      <path d="M1 -3 L-2 1 L0 1 L-1 4 L2 0 L0 0 Z" fill="#0984E3"/>
    </g>

    <!-- AI Agent 核心头像 -->
    <g>
      <!-- 头部 -->
      <rect x="-13" y="-16" width="26" height="24" rx="7" fill="white"/>

      <!-- 天线 -->
      <line x1="0" y1="-16" x2="0" y2="-24" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="0" cy="-26" r="3" fill="white" opacity="0.9"/>

      <!-- 左眼 -->
      <circle cx="-5.5" cy="-7" r="3.2" fill="#6C5CE7"/>
      <circle cx="-5.5" cy="-7" r="1.2" fill="white" opacity="0.6"/>

      <!-- 右眼 -->
      <circle cx="5.5" cy="-7" r="3.2" fill="#0984E3"/>
      <circle cx="5.5" cy="-7" r="1.2" fill="white" opacity="0.6"/>

      <!-- 嘴巴 - 处理状态条 -->
      <rect x="-6" y="2" width="12" height="2.8" rx="1.4" fill="#A29BFE"/>

      <!-- 身体躯干 -->
      <path d="M-9 9 L-11 22 Q-11 25.5 -7.5 25.5 L7.5 25.5 Q11 25.5 11 22 L9 9 Z"
            fill="white" opacity="0.88"/>

      <!-- 躯干技能槽 -->
      <line x1="-4.5" y1="14" x2="4.5" y2="14" stroke="#6C5CE7" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="-3" y1="19" x2="3" y2="19" stroke="#0984E3" stroke-width="1.6" stroke-linecap="round"/>
    </g>

    <!-- 连接线：Agent 到各节点 -->
    <line x1="-10" y1="-12" x2="-17" y2="-14" stroke="rgba(255,255,255,0.35)" stroke-width="1" stroke-dasharray="3 2"/>
    <line x1="10" y1="-12" x2="17" y2="-14" stroke="rgba(255,255,255,0.35)" stroke-width="1" stroke-dasharray="3 2"/>
    <line x1="8" y1="18" x2="13" y2="15" stroke="rgba(255,255,255,0.35)" stroke-width="1" stroke-dasharray="3 2"/>
  </g>
</svg>