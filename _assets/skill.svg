<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="50%" stop-color="#8E44AD"/>
      <stop offset="100%" stop-color="#0984E3"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E4FF"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="100" height="100" rx="24" fill="url(#bg)"/>
  <!-- 高光层 -->
  <rect x="4" y="4" width="92" height="92" rx="20" fill="url(#shine)"/>

  <!-- 外圈装饰轨道 -->
  <circle cx="50" cy="50" r="42" stroke="rgba(255,255,255,0.08)" stroke-width="1.2" stroke-dasharray="6 4" fill="none"/>

  <!-- SKILL 主文字 -->
  <text x="50" y="58" font-size="30" font-weight="bold" fill="url(#textGrad)" font-family="Arial,Helvetica,sans-serif" text-anchor="middle" letter-spacing="4">SKILL</text>

  <!-- 文字下方装饰线 -->
  <rect x="22" y="64" width="56" height="2.5" rx="1.2" fill="rgba(255,255,255,0.3)"/>

  <!-- 左上角：闪电图标 = 工具执行能力 -->
  <g transform="translate(22, 28)">
    <circle r="8" fill="rgba(255,255,255,0.15)"/>
    <path d="M2 -5 L-2 0.5 L1 0.5 L-1 5 L3 -0.5 L0 -0.5 Z" fill="white" opacity="0.9"/>
  </g>

  <!-- 右上角：齿轮图标 = 技能配置 -->
  <g transform="translate(78, 28)">
    <circle r="8" fill="rgba(255,255,255,0.15)"/>
    <circle cx="0" cy="0" r="3" stroke="white" stroke-width="1.5" fill="none" opacity="0.9"/>
    <path d="M0 -5 L0 -3.5 M0 3.5 L0 5 M-5 0 L-3.5 0 M3.5 0 L5 0" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- 左下角：列表图标 = 技能管理 -->
  <g transform="translate(22, 78)">
    <circle r="7" fill="rgba(255,255,255,0.12)"/>
    <line x1="-3" y1="-2.5" x2="3" y2="-2.5" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
    <line x1="-3" y1="2.5" x2="1" y2="2.5" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- 右下角：加号图标 = 安装技能 -->
  <g transform="translate(78, 78)">
    <circle r="7" fill="rgba(255,255,255,0.12)"/>
    <path d="M0 -3.5 L0 3.5 M-3.5 0 L3.5 0" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
  </g>
</svg>
