version: 0.2.4
type: plugin
author: liux297
name: skill_agent
repo: https://github.com/liux297/skill_agent
label:
  zh_Hans: Skill_Agent
  en_US: Skill_Agent
  ja_JP: Skill_Agent
  pt_BR: Skill_Agent
description:
  zh_Hans: >-
    Skill_Agent 是基于 Skill 渐进式披露模式构建的通用型 Agent 插件。把本地 skills/ 目录当作"工具箱"，
    支持自定义变量注入、文件交付与流式对话输出，具备模型能力自动检测（Function Calling 与 JSON 协议自动切换）、
    统一工具执行管线、基于 Token 估算的上下文智能压缩与自动恢复、JSON 智能压缩、命令白名单安全沙箱等特性。
    技能通过 SKILL.md（含 YAML frontmatter）热插拔，可跨轮次交互。
  en_US: >-
    Skill_Agent is a general-purpose Agent plugin built on the Skill Progressive
    Disclosure pattern. It treats the local skills/ directory as a toolbox, supports
    custom_variables injection, file delivery and streaming output, and features
    adaptive model capability detection (auto-switching between Function Calling and
    JSON protocol), unified tool execution pipeline, token-aware context compaction
    with auto-recovery, smart JSON compression, and a command whitelist sandbox for
    safe script execution. Skills are hot-pluggable via SKILL.md with YAML frontmatter.
  ja_JP: >-
    Skill_Agent は、Skill 漸進的開示パターンに基づく汎用的な Agent プラグインです。
    ローカル skills/ ディレクトリを"ツールボックス"として扱い、カスタム変数の注入、
    ファイル出力、ストリーミング出力をサポートします。
  pt_BR: >-
    Skill_Agent é um plugin de Agent de uso geral baseado no padrão de Divulgação
    Progressiva de Skills. Trata o diretório local skills/ como uma caixa de
    ferramentas, suporta injeção de custom_variables, entrega de arquivos e saída
    em streaming.
icon: skill.svg
icon_dark: skill.svg
resource:
  memory: 268435456
  permission:
    tool:
      enabled: true
    model:
      enabled: true
      llm: true
      text_embedding: false
      rerank: false
      tts: false
      speech2text: false
      moderation: false
    endpoint:
      enabled: true
    app:
      enabled: true
    storage:
      enabled: true
      size: 104857600
plugins:
  tools:
    - provider/skill_agent.yaml
meta:
  version: 0.2.4
  arch:
    - amd64
    - arm64
  runner:
    language: python
    version: "3.12"
    entrypoint: main
  minimum_dify_version: null
created_at: 2026-01-22T14:14:33.3888065+08:00
privacy: PRIVACY.md
verified: false
